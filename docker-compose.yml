version: "3.9"

services:
  # ── Qdrant vector store ────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Ollama (LLM + optional embeddings) ────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull model on startup; change LLM_MODEL in .env to switch models
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull ${LLM_MODEL:-qwen3:4b} && wait"]
    environment:
      - OLLAMA_KEEP_ALIVE=5m   # scale-to-zero: unload model after 5 min idle
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./backend/data:/app/data          # persist data files
      - piper_voices:/app/piper_voices    # persist downloaded voice models
      - model_cache:/root/.cache          # persist HuggingFace BGE-M3 cache
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  qdrant_data:
  ollama_data:
  piper_voices:
  model_cache:
